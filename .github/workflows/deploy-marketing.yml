name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/marketing/**'
      - 'packages/lib/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build lib
        run: npm run build:lib

      - name: Build marketing site
        run: npm run build:marketing

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Hetzner
        run: rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" packages/marketing/dist/ root@${{ secrets.HETZNER_HOST }}:/opt/token-beam-marketing/

      - name: Reload Nginx
        run: ssh -i ~/.ssh/deploy_key root@${{ secrets.HETZNER_HOST }} "nginx -t && systemctl reload nginx"
