<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./ui.css" />
</head>
<body>
  <div class="plugin">
    <section class="plugin__section">
      <label class="plugin__label" for="token-input">Session Token</label>
      <div class="plugin__input-row">
        <input class="plugin__input" id="token-input" type="text" placeholder="beam://XXXXXX" />
      </div>
      <p class="plugin__hint">Get a token from any app that supports Token Beam, such as <a href="https://farbvelo.elastiq.ch" target="_blank">farbvelo</a>, <a href="https://meodai.github.io/poline/" target="_blank">poline</a>, or <a href="https://okpalette.color.pizza/" target="_blank">OKPalette</a>. Copy the session token and paste it here. See <a href="https://tokenbeam.dev" target="_blank">tokenbeam.dev</a> for the full list.</p>
    </section>

    <div class="plugin__connect-wrap">
      <button class="plugin__button plugin__button--primary" id="connect-btn" disabled>Connect &amp; Sync</button>
    </div>
    <div class="plugin__status plugin__hidden" id="sync-status">
      <span class="plugin__status-text" id="sync-status-text"></span>
    </div>
    <div class="plugin__result plugin__hidden" id="result">
      <span class="plugin__result-text" id="result-text"></span>
      <span class="plugin__result-time" id="result-time"></span>
    </div>
  </div>
  <script type="module" src="./ui.ts"></script>
</body>
</html>
